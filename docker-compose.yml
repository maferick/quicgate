services:
  quicgate:
    image: registry.vdlaken.eu/quicgate:latest
    container_name: quicgate
    restart: unless-stopped
    # Host networking: stream forwards bind host ports dynamically (no
    # pre-published port list) and the engine sees real client IPs, which
    # access-list IP filtering depends on. Engine owns 80/443(tcp+udp),
    # admin UI 81, plus any configured stream ports.
    network_mode: host
    environment:
      - QG_ACME_EMAIL=gijs.vanderlaken@gmail.com
      # Requests router forwards for 80/443 + stream ports via UPnP IGD.
      # Needs "permit independent port sharing" for this device on the
      # FRITZ!Box. 80/443 conflict while they still forward to .92; logged.
      - QG_UPNP=1
    volumes:
      - /opt/quicgate:/data
