services:
  quicgate:
    image: registry.vdlaken.eu/quicgate:latest
    container_name: quicgate
    restart: unless-stopped
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"
      - "81:81/tcp"
    environment:
      - QG_ACME_EMAIL=gijs.vanderlaken@gmail.com
    volumes:
      - /opt/quicgate:/data
